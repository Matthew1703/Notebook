server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  ring:
    kvstore:
      store: inmemory          # ← явно

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory        # ← явно
      replication_factor: 1
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h
  ring:
    kvstore:
      store: inmemory          # ← явно

storage:
  trace:
    backend: local
    wal:
      path: /var/tmp/tempo/wal
    local:
      path: /var/tmp/tempo/blocks

metrics_generator:
  storage:
    path: /tmp/tempo/generator/wal
  registry:
    external_labels:
      source: tempo
  ring:
    kvstore:
      store: inmemory          # ← явно

overrides:
  metrics_generator_processors: []